{% extends "core/base.html" %}
{% block title %}Assign Faculty Advisor{% endblock %}
{% block content %}
<div class="card">
    <h2>Assign / Change Faculty Advisor</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary mt-8">Assign Advisor</button>
    </form>
</div>
<a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">← Back</a>
{% endblock %}
