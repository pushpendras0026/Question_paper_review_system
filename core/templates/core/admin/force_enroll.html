{% extends "core/base.html" %}
{% block title %}Force Enroll Student{% endblock %}
{% block content %}
<div class="card">
    <h2>Force Enroll Student into Extra Credit / Course</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary mt-8">Enroll Student</button>
    </form>
</div>
<a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">← Back</a>
{% endblock %}
