{% extends "core/base.html" %}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}

<style>
.dept-section { margin-bottom: 32px; }
.dept-header {
    background: linear-gradient(135deg, #1a1f35, #2d3561);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px 8px 0 0;
    font-weight: 700;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
}
.dept-badge {
    background: #4f6ef7;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.78rem;
    font-weight: 600;
}
.sem-group { margin-bottom: 12px; }
.sem-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: #7b8cb0;
    padding: 4px 14px;
    background: #f0f3ff;
    border-left: 3px solid #4f6ef7;
    margin-bottom: 0;
}
.dept-table { border-radius: 0; margin-bottom: 0; }
.dept-table th { background: #f8f9ff; font-size: 0.82rem; padding: 8px 12px; }
.dept-table td { padding: 8px 12px; font-size: 0.88rem; vertical-align: middle; }
.action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
</style>

<div class="card">
    <h2>Admin Actions</h2>
    <div>
        <a href="{% url 'admin_create_course' %}"> Create Course</a>
        <br>
        <a href="{% url 'admin_manage_courses' %}">Manage Courses</a>
        <br>
        <a href="{% url 'admin_add_faculty' %}"> Add Faculty</a>
        <br>
        <a href="{% url 'admin_add_student' %}"> Add Student</a>
        <br>
        <a href="{% url 'admin_ended_courses' %}">View Ended Courses</a>
    </div>
</div>


{% endblock %}
