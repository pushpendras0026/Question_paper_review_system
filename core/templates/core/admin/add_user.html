{% extends "core/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card">
    <h2>{{ title }}</h2>
    <p class="text-sm text-muted">Use official institute email only (must end with @iitg.ac.in). Department must be selected from the dropdown.</p>
    <form method="post">
        {% csrf_token %}
        <table style="max-width: 600px;">
            {{ form.as_table }}
        </table>
        <button type="submit" class="btn btn-primary mt-16">Add User</button>
    </form>
</div>
<a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">← Back</a>
{% endblock %}
