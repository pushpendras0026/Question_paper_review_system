<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QPRS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 32px;
            width: 380px;
        }

        .login-box h1 {
            font-size: 20px;
            text-align: center;
            margin-bottom: 4px;
            color: #2c3e50;
        }

        .login-box p {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            background: #3498db;
            margin-top: 8px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .messages {
            list-style: none;
            margin-bottom: 12px;
        }

        .messages li {
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .messages .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Question Paper Review System</h1>
        <p>Login to your account</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn">Login</button>
        </form>
        
        <div style="text-align: center; margin-top: 16px;">
            <span style="font-size: 13px; color: #666;">Are you a student? <a href="{% url 'student_signup' %}" style="color: #3498db; text-decoration: none;">Sign Up</a></span>
        </div>
    </div>
</body>
</html>
