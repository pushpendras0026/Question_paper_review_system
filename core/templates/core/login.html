<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — QPRS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 32px; width: 380px; }
        .login-box h1 { font-size: 20px; text-align: center; margin-bottom: 4px; color: #2c3e50; }
        .login-box p { text-align: center; color: #999; font-size: 13px; margin-bottom: 20px; }
        .role-tabs { display: flex; gap: 0; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .role-tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 12px; cursor: pointer; border: none; background: #f8f9fa; color: #666; transition: all 0.2s; }
        .role-tab.active { background: #3498db; color: white; }
        .role-tab:hover:not(.active) { background: #e9ecef; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #555; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; color: white; background: #3498db; margin-top: 8px; }
        .btn:hover { background: #2980b9; }
        .messages { list-style: none; margin-bottom: 12px; }
        .messages li { padding: 8px; border-radius: 4px; font-size: 13px; margin-bottom: 4px; }
        .messages .error { background: #f8d7da; color: #721c24; }
        #role-input { display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Question Paper Review System</h1>
        <p>Select your role and login</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <div class="role-tabs">
            <button type="button" class="role-tab active" data-role="student">Student</button>
            <button type="button" class="role-tab" data-role="professor">Faculty</button>
            <button type="button" class="role-tab" data-role="admin">Admin</button>
            <button type="button" class="role-tab" data-role="ta">TA</button>
        </div>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="role" id="role-input" value="student">

            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <script>
        document.querySelectorAll('.role-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('role-input').value = tab.dataset.role;
            });
        });
    </script>
</body>
</html>
